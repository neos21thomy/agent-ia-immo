<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — LeadEngine AI</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/favicon.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif; background: #07070f; color: #f0f0ff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 1.5rem; line-height: 1.7;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle 600px at 50% 30%, rgba(124,58,237,.2), transparent 70%);
    }
    .box { max-width: 520px; }
    .code {
      font-family: 'Space Grotesk', sans-serif; font-size: 5.5rem; font-weight: 700; line-height: 1;
      background: linear-gradient(120deg, #c4b5fd, #e879f9 60%, #a78bfa);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sat { font-size: 2.6rem; display: block; margin-bottom: .6rem; filter: drop-shadow(0 0 18px rgba(167,139,250,.7)); }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; margin: .8rem 0; }
    p { color: #9090b8; font-size: .95rem; margin-bottom: 1.8rem; }
    .actions { display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; }
    a {
      display: inline-block; font-weight: 700; font-size: .9rem; padding: .85rem 1.6rem;
      border-radius: 12px; text-decoration: none;
    }
    .solid { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; box-shadow: 0 10px 28px -10px rgba(124,58,237,.8); }
    .line { border: 1px solid rgba(167,139,250,.4); color: #c4b5fd; }
  </style>
</head>
<body>
  <div class="box">
    <span class="sat">🛰</span>
    <div class="code">404</div>
    <h1>Cette page s'est perdue en orbite</h1>
    <p>Elle a peut-être été déplacée — notre site a récemment fait peau neuve.
    Tout ce que vous cherchez se trouve depuis l'accueil.</p>
    <div class="actions">
      <a href="/" class="solid">← Accueil LeadEngine AI</a>
      <a href="/agents-ia-immo" class="line">🏠 Agents IA Immo</a>
      <a href="/creation-site-internet" class="line">🌐 Sites internet</a>
    </div>
  </div>
</body>
</html>
