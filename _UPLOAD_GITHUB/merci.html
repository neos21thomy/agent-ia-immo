<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci ! On vous rappelle très vite — LeadEngine AI</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="favicon.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif; background: #07070f; color: #f0f0ff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 1.5rem; line-height: 1.7;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle 600px at 50% 30%, rgba(124,58,237,.2), transparent 70%);
    }
    .box { max-width: 480px; }
    .ic { font-size: 3.4rem; display: block; margin-bottom: 1rem; filter: drop-shadow(0 0 20px rgba(167,139,250,.7)); animation: pop .6s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes pop { from { transform: scale(.4); opacity: 0; } }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.9rem; margin-bottom: .8rem; }
    .gr { background: linear-gradient(120deg, #c4b5fd, #e879f9); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #9090b8; font-size: .95rem; margin-bottom: 1.6rem; }
    a {
      display: inline-block; background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff;
      font-weight: 700; font-size: .9rem; padding: .85rem 1.7rem; border-radius: 12px; text-decoration: none;
      box-shadow: 0 10px 28px -10px rgba(124,58,237,.8);
    }
  </style>
</head>
<body>
  <div class="box">
    <span class="ic">🚀</span>
    <h1>Message bien reçu, <span class="gr">merci !</span></h1>
    <p>Thomas vous rappelle sous <strong style="color:#c4b5fd;">48h</strong> (souvent bien plus vite).
    En attendant, jetez un œil au blog ou découvrez les agents IA.</p>
    <a href="index.html">← Retour à l'accueil</a>
  </div>
</body>
</html>
